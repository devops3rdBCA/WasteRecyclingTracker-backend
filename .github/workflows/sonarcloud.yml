name: SonarCloud (Backend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build & SonarCloud analyze
    runs-on: ubuntu-latest

    steps:
      # Debug: Check if PERSONAL_TOKEN secret is available
      - name: Check if PERSONAL_TOKEN secret is available
        run: |
          if [ -z "${{ secrets.PERSONAL_TOKEN }}" ]; then
            echo "PERSONAL_TOKEN is NOT set!"
            exit 1
          else
            echo "PERSONAL_TOKEN is set and available."
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_TOKEN }}   # Use your PAT consistently

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build + Test + SonarCloud scan (Maven)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  # Keep your SonarCloud token here
        run: |
          mvn -B -V clean verify sonar:sonar \
            -Dsonar.organization=devops3rdbca \
            -Dsonar.projectKey=devops3rdBCA_WasteRecyclingTracker-backend \
            -Dsonar.host.url=https://sonarcloud.io
