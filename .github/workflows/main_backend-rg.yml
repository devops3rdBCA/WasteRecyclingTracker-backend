name: Build and deploy Spring Boot app to Azure Web App - backend-rg

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read  # Read-only is fine since we are not pushing back

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Debug: Check if PERSONAL_TOKEN secret is available
      - name: Check if PERSONAL_TOKEN secret is available
        run: |
          if [ -z "${{ secrets.PERSONAL_TOKEN }}" ]; then
            echo "PERSONAL_TOKEN is NOT set!"
            exit 1
          else
            echo "PERSONAL_TOKEN is set and available."
          fi

      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          persist-credentials: true

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build the Spring Boot app
      - name: Build with Maven
        run: mvn clean package

      # Upload the JAR artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Debug: Check if PERSONAL_TOKEN secret is available in deploy job
      - name: Check if PERSONAL_TOKEN secret is available
        run: |
          if [ -z "${{ secrets.PERSONAL_TOKEN }}" ]; then
            echo "PERSONAL_TOKEN is NOT set!"
            exit 1
          else
            echo "PERSONAL_TOKEN is set and available."
          fi

      # Checkout the code again (required for Azure deploy)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          persist-credentials: true

      # Download the JAR artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'backend-rg'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'java-app/*.jar'
