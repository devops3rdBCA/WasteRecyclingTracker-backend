deploy:
  runs-on: ubuntu-latest
  needs: build
  permissions:
    id-token: write
    contents: read

  steps:
    - name: Checkout code   # 👈 ADD THIS
      uses: actions/checkout@v4

    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: java-app

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F7A8FB3DE019441CAC8E0F9DE304D826 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4D18BAB319A1421F9D2AD72CD88C7528 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E1677122D71D4026AB33985ACE4E8C16 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'backend-rg'
        slot-name: 'Production'
        package: '*.jar'
