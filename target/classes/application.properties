spring.application.name=waste-recycling-tracker-backend

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Actuator
management.endpoints.web.exposure.include=health,info

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Non-production bootstrap users
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin123
app.bootstrap.family.username=family
app.bootstrap.family.password=family123
app.bootstrap.center.username=center
app.bootstrap.center.password=center123

# Logging
logging.level.root=INFO
logging.level.com.wasterecyclingtracker=DEBUG
logging.level.org.springframework.security=DEBUG
